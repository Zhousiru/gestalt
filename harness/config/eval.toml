# Harness-owned LLM judge configuration.
# Secrets stay in the named environment variable; this file is safe to commit.
model_provider = "openrouter"
model_base_url = "https://openrouter.ai/api/v1"
model_name = "deepseek/deepseek-v4-pro"
model_api_key_env = "OPENROUTER_API_KEY"

model_routing_order = "deepseek"
model_routing_allow_fallbacks = false
model_thinking = "disabled"

temperature = 0.1
timeout_ms = 300000
